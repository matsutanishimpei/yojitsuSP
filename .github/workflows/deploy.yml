name: Check and Deploy
on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check

  deploy-backend:
    if: github.event_name == 'push' && vars.SP_DEPLOY_ENABLED == 'true'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      # バックエンドのデプロイ
      - name: Deploy API
        run: npm run deploy -w packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    if: github.event_name == 'push' && vars.SP_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs: deploy-backend # バックエンドが終わってからフロントを更新
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      # フロントエンドのビルドとデプロイ
      - run: npm run build -w packages/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || vars.VITE_API_URL }}
          CSP_REQUIRE_API_URL: 'true'
      - name: Deploy Pages
        run: npx wrangler pages deploy packages/frontend/dist --project-name=yojitsu-sp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
